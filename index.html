<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwnTalk Iterative Light-to-Dark Prompt Generator</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --light-btn: #f39c12;
            --dark-btn: #34495e;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4f5d73;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .character-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .char-chip {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: #ffffff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            transition: all 0.2s ease;
        }

        .char-chip:hover {
            background-color: #f0f4f8;
        }

        .char-chip.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 6px rgba(74, 144, 226, 0.3);
        }

        .btn-container {
            text-align: center;
            margin: 25px 0;
        }

        .main-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .main-btn:hover {
            background-color: #357abd;
        }

        .output-section {
            margin-top: 30px;
            border-top: 2px solid #e9ecef;
            padding-top: 20px;
            display: none;
        }

        .output-group {
            margin-bottom: 25px;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .output-header label {
            margin-bottom: 0;
            font-size: 15px;
        }

        .copy-btn {
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .light-copy { background-color: var(--light-btn); }
        .light-copy:hover { background-color: #d35400; }
        
        .dark-copy { background-color: var(--dark-btn); }
        .dark-copy:hover { background-color: #2c3e50; }

        .result-box {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            height: 380px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OwnTalk Step-by-Step Prompt Generator</h1>

    <div class="input-group">
        <label>0. 장면에 등장할 캐릭터 선택 (중복 가능)</label>
        <div class="character-selector">
            <button class="char-chip" data-char="John_E" onclick="toggleChar(this)">👦 John (초등 11~12세)</button>
            <button class="char-chip" data-char="John_T" onclick="toggleChar(this)">🧑 John (청소년 15~16세)</button>
            <button class="char-chip" data-char="John_G" onclick="toggleChar(this)">👨 John (대학일반 27~28세)</button>
            <button class="char-chip" data-char="Mary_E" onclick="toggleChar(this)">👧 Mary (초등 11~12세)</button>
            <button class="char-chip" data-char="Mary_T" onclick="toggleChar(this)">👩 Mary (청소년 15~16세)</button>
            <button class="char-chip" data-char="Mary_G" onclick="toggleChar(this)">👩‍💼 Mary (대학일반 27~28세)</button>
        </div>
    </div>

    <div class="input-group">
        <label for="dialogueInput">1. 영문 다이알로그 (English Dialogue)</label>
        <textarea id="dialogueInput" placeholder="여기에 영어 대화문을 붙여넣으세요..."></textarea>
    </div>

    <div class="input-group">
        <label for="bgInput">2. 배경 및 세부 디자인 설명 (원하는 연출/수정사항 자유롭게 기술)</label>
        <textarea id="bgInput" placeholder="예: 잠옷 차림에 머리를 잡고 당황해 하고 있다. 침대옆 자명종 시계는 7시30분. 책상은 두고 옷바구니는 제거해줘."></textarea>
    </div>

    <div class="input-group">
        <label for="lightRefInput" style="color: #d35400;">3. [선택] 제미나이가 최종 생성한 라이트 모드 이미지 파일명 (다크 모드 변환용)</label>
        <input type="text" id="lightRefInput" placeholder="예: image_12345.png (입력하지 않으면 직전에 생성한 이미지를 자동 참조합니다)">
    </div>

    <div class="btn-container">
        <button class="main-btn" onclick="generateSplitPrompts()">시나리오별 코멘트 생성하기</button>
    </div>

    <div id="outputSection" class="output-section">
        
        <div class="output-group">
            <div class="output-header">
                <label style="color: #d35400;">☀️ **STAGE 1: 라이트 모드 전용 코멘트**</label>
                <button class="copy-btn light-copy" onclick="copyText('lightOutput')">라이트 모드 코멘트 복사</button>
            </div>
            <textarea id="lightOutput" class="result-box" readonly></textarea>
        </div>

        <div class="output-group">
            <div class="output-header">
                <label style="color: #2c3e50;">🌙 **STAGE 2: 다크 모드 전환 코멘트**</label>
                <button class="copy-btn dark-copy" onclick="copyText('darkOutput')">다크 모드 코멘트 복사</button>
            </div>
            <textarea id="darkOutput" class="result-box" readonly></textarea>
        </div>

    </div>
</div>

<script>
    function toggleChar(btn) {
        btn.classList.toggle('selected');
    }

    const characterDatabase = {
        "John_E": {
            url: "https://raw.githubusercontent.com/JangJiyoung/ImgGeneration/main/John_E.png",
            profile: "A 11-12 years old elementary school boy, short messy brown hair, big warm brown eyes, adorable freckles on cheeks, bright and friendly look."
        },
        "John_T": {
            url: "https://raw.githubusercontent.com/JangJiyoung/ImgGeneration/main/John_T.png",
            profile: "A 15-16 years old high school teenager boy, slimmer jawline, slightly taller and mature stature, styled messy brown hair, brown eyes, faint freckles."
        },
        "John_G": {
            url: "https://raw.githubusercontent.com/JangJiyoung/ImgGeneration/main/John_G.png",
            profile: "A 27-28 years old young adult man, clean-shaven sharp jawline, mature and well-groomed brown hair, deep brown eyes, sophisticated modern adult look."
        },
        "Mary_E": {
            url: "https://raw.githubusercontent.com/JangJiyoung/ImgGeneration/main/Mary_E.png",
            profile: "A 11-12 years old elementary school girl, long curly brown hair tied back, warm brown eyes, cute freckles across the nose, sweet smiling look."
        },
        "Mary_T": {
            url: "https://raw.githubusercontent.com/JangJiyoung/ImgGeneration/main/Mary_T.png",
            profile: "A 15-16 years old high school teenager girl, slender face, beautifully balanced realistic body proportion, long wavy brown hair tied in a high ponytail, brown eyes, freckles."
        },
        "Mary_G": {
            url: "https://raw.githubusercontent.com/JangJiyoung/ImgGeneration/main/Mary_G.png",
            profile: "A 27-28 years old young adult woman, mature and elegant facial features, highly balanced and realistic feminine body proportion, stylishly groomed long wavy brown hair, expressive brown eyes."
        }
    };

    function translateKoreanToEnglish(text) {
        if (!text.trim()) return "Matching the mood and context of the dialogue naturally.";
        
        let translated = text;
        const dict = {
            "수학 교실": "a math classroom",
            "교실": "a classroom",
            "방": "the bedroom",
            "책상": "the desk",
            "침대": "the bed",
            "자명종 시계": "the alarm clock",
            "잠옷 차림": "wearing pajamas",
            "당황해 하는": "panicking and holding his head",
            "말풍선 제거": "speech bubbles removed",
            "말풍선 빼줘": "speech bubbles excluded",
            "말풍선": "speech bubbles",
            "글자 제거": "text removed",
            "글자": "text",
            "제거": "removed",
            "제외": "excluded",
            "천정": "ceiling"
        };

        for (let key in dict) {
            let reg = new RegExp(key, "g");
            translated = translated.replace(reg, dict[key]);
        }
        return translated;
    }

    function generateSplitPrompts() {
    const dialogue = document.getElementById('dialogueInput').value.trim();
    const bgKo = document.getElementById('bgInput').value.trim();
    const lightRef = document.getElementById('lightRefInput').value.trim();

    if (!dialogue) {
        alert('영문 다이알로그를 입력해 주세요!');
        return;
    }

    const bgEn = translateKoreanToEnglish(bgKo);
    const selectedChips = document.querySelectorAll('.char-chip.selected');
    let visualReferenceLines = [];
    let profileLines = [];
    
    // 연령대 체크를 위한 변수
    let isElementary = false;
    let isTeenager = false;

    selectedChips.forEach(chip => {
        const charKey = chip.getAttribute('data-char');
        if (charKey.endsWith('_E')) isElementary = true;
        if (charKey.endsWith('_T')) isTeenager = true;

        const charData = characterDatabase[charKey];
        if (charData) {
            visualReferenceLines.push(`- Analyze and perfectly replicate the face, facial features, hair style, and overall character proportions from this direct image URL: [ ${charData.url} ]`);
            profileLines.push(`- ${charData.profile}`);
        }
    });

    // [추가] 연령대 및 소품 복잡도 통제 로직
    let deskControlPrompt = "";
    if (isElementary) {
        deskControlPrompt = `
[Desk Environment Control - Age 11-12 Elementary School Level]
- Keep the desk very clean and minimal. Remove excessive props or clutter to avoid a messy look.
- Place only a simple open notebook, a few colored pencils, and an eraser.
- STRICTLY PROHIBITED: No complex chemical formulas, high-level molecular structures, advanced technical blueprints, or text. If there are sketches on the note, they must be simple, cute, child-like drawings (e.g., a simple cartoon volcano sketch).`;
    } else if (isTeenager) {
        deskControlPrompt = `
[Desk Environment Control - Age 15-16 High School Level]
- Keep the desk neatly organized without chaotic clutter.
- Place basic student school supplies (a simple textbook, a neat notebook, and pens).
- No overly professional, college-level research papers, dense data graphs, or advanced university-level equations. Keep the textbook illustrations clean and standard.`;
    } else {
        // 성인용 혹은 기본 설정
        deskControlPrompt = `
[Desk Environment Control - General]
- Keep the composition neat and balanced. Avoid messy clutter on the desk.`;
    }

    const referenceSection = visualReferenceLines.length > 0 ? visualReferenceLines.join('\n') : '- Maintain a consistent modern webtoon illustration art style.';
    const profileSection = profileLines.length > 0 ? profileLines.join('\n') : '- Keep character appearance natural according to the context.';

    // [STAGE 1] 라이트 모드 (deskControlPrompt 분문 삽입)
    const lightPrompt = `[CRITICAL SYSTEM DIRECTION: IMMEDIATELY call your internal image generation tool to render the artwork now. DO NOT reply with text descriptions.]

Please generate ONE single illustration for [LIGHT MODE] with a strict 1:1 square aspect ratio.

[Visual Reference & Character Consistency - CRITICAL]
${referenceSection}
- Maintain the identical modern Anime/Webtoon illustration style, line work, and coloring method from the reference URL(s).
${profileSection}

[Anonymity & Text Exclusion - CRITICAL]
- DO NOT add any name tags, labels, or names onto the image or pointing at characters. 
- DO NOT include any speech bubbles, callouts, dialogue text, or alphabet letters inside the illustration. 
- The image must remain entirely clean, pure artwork-only without any UI elements.

[Dialogue & Situation]
- Dialogue (Use ONLY for context): 
${dialogue}

- Detailed Scene Setup & Modifications: 
${bgEn}
${deskControlPrompt}  <!-- 생성된 연령별 소품 통제 프롬프트가 여기에 삽입됩니다 -->

[Image Specifications: Light Mode]
- Bright, warm, and natural morning/daytime room lighting.
- Soft beige, cream, and warm tones for the overall color palette.
- Do NOT split the screen. Generate exactly ONE clean 1:1 square image.

[FINAL COMMAND: Trigger the image generation tool immediately.]`;

        // [STAGE 2] 다크 모드 (직전 턴 강제 상속)
        let imageInheritanceText = '- Refer to the EXACT [LIGHT MODE] image that you successfully generated in the VERY LAST turn.';
        if (lightRef) {
            imageInheritanceText = `- Refer to the specific [LIGHT MODE] image file named "${lightRef}" verbatim.`;
        }

        const darkPrompt = `[CRITICAL SYSTEM DIRECTION: IMMEDIATELY call your internal image generation tool to render the artwork now. DO NOT reply with text descriptions.]

Based on the FINALLY ESTABLISHED [LIGHT MODE] image. Now, convert that EXACT SAME SCENE into [DARK MODE] as ONE single 1:1 square illustration.

[Strict Consistency from the Target Image - CRITICAL]
${imageInheritanceText}
- FREEZE THE COMPOSITION: Keep absolutely everything EXACTLY THE SAME as the referenced light mode image.
- The characters' exact poses, facial expressions, the placement of ALL objects (desks, food, clocks, etc.), and the overall layout MUST NOT CHANGE.
- Retain all the modifications made in that final light mode version.
- Do NOT change the camera angle or character appearances. Simply shift the environment from day to night.

[Anonymity & Text Exclusion - CRITICAL]
- ABSOLUTELY NO text, letters, character names, labels, speech bubbles, or captions. Maintain a completely clean illustration without any textual elements.

[Image Specifications: Dark Mode]
- Dimmed, cool, and nocturnal atmosphere.
- Change the overall color palette to dark teal, cyan, and deep blue-green tones.
- Replace the warm daytime light with a cool neon/artificial overhead light glow from the ceiling.
- Do NOT split the screen or show side-by-side comparison. Generate exactly ONE clean 1:1 dark mode image.

[FINAL COMMAND: Trigger the image generation tool immediately.]`;

        document.getElementById('lightOutput').value = lightPrompt;
        document.getElementById('darkOutput').value = darkPrompt;
        document.getElementById('outputSection').style.display = 'block';
    }

    function copyText(elementId) {
        const resultText = document.getElementById(elementId);
        if (!resultText.value) {
            alert('생성된 코멘트가 없습니다.');
            return;
        }
        resultText.select();
        document.execCommand('copy');
        
        const modeName = elementId === 'lightOutput' ? '라이트 모드' : '다크 모드';
        alert(`${modeName} 코멘트가 클립보드에 복사되었습니다! 제미나이에 붙여넣으세요.`);
    }
</script>

</body>
</html>
