<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwnTalk Iterative Light-to-Dark Prompt Generator</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --light-btn: #f39c12;
            --dark-btn: #34495e;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4f5d73;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-container {
            text-align: center;
            margin: 25px 0;
        }

        .main-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .main-btn:hover {
            background-color: #357abd;
        }

        .output-section {
            margin-top: 30px;
            border-top: 2px solid #e9ecef;
            padding-top: 20px;
            display: none;
        }

        .output-group {
            margin-bottom: 25px;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .output-header label {
            margin-bottom: 0;
            font-size: 15px;
        }

        .copy-btn {
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .light-copy { background-color: var(--light-btn); }
        .light-copy:hover { background-color: #d35400; }
        
        .dark-copy { background-color: var(--dark-btn); }
        .dark-copy:hover { background-color: #2c3e50; }

        .result-box {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            height: 250px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OwnTalk Step-by-Step Prompt Generator</h1>

    <!-- 1. 영문 다이알로그 입력창 -->
    <div class="input-group">
        <label for="dialogueInput">1. 영문 다이알로그 (English Dialogue)</label>
        <textarea id="dialogueInput" placeholder="여기에 영어 대화문을 붙여넣으세요..."></textarea>
    </div>

    <!-- 2. 한글 배경 및 디자인 설명 입력창 -->
    <div class="input-group">
        <label for="bgInput">2. 배경 및 세부 디자인 설명 (원하는 연출/수정사항 자유롭게 기술)</label>
        <textarea id="bgInput" placeholder="예: John은 잠옷 차림에 머리를 잡고 당황해 하고 있다. 침대옆 자명종 시계는 7시30분. 책상은 두고 옷바구니와 말풍선은 제거해줘."></textarea>
    </div>

    <!-- 3. ★ 신규: 확정된 라이트 모드 이미지 참조창 -->
    <div class="input-group">
        <label for="lightRefInput" style="color: #d35400;">3. [선택] 제미나이가 최종 생성한 라이트 모드 이미지 파일명 (다크 모드 변환용)</label>
        <input type="text" id="lightRefInput" placeholder="예: watermarked_img_17957715240105170400.png (라이트 모드가 완전히 확정되면 여기에 넣으세요)">
    </div>

    <div class="btn-container">
        <button class="main-btn" onclick="generateSplitPrompts()">시나리오별 코멘트 생성하기</button>
    </div>

    <!-- 완성된 결과 출력 영역 -->
    <div id="outputSection" class="output-section">
        
        <!-- [1] 라이트 모드 전용 생성 창 -->
        <div class="output-group">
            <div class="output-header">
                <label style="color: #d35400;">☀️ **STAGE 1: 라이트 모드 전용 코멘트** (원하는 결과가 나올 때까지 수정 오더용으로 사용)</label>
                <button class="copy-btn light-copy" onclick="copyText('lightOutput')">라이트 모드 코멘트 복사</button>
            </div>
            <textarea id="lightOutput" class="result-box" readonly></textarea>
        </div>

        <!-- [2] 다크 모드 전용 생성 창 -->
        <div class="output-group">
            <div class="output-header">
                <label style="color: #2c3e50;">🌙 **STAGE 2: 확정된 라이트 모드를 기반으로 한 다크 모드 전환 코멘트**</label>
                <button class="copy-btn dark-copy" onclick="copyText('darkOutput')">다크 모드 코멘트 복사</button>
            </div>
            <textarea id="darkOutput" class="result-box" readonly></textarea>
        </div>

    </div>
</div>

<script>
    function translateKoreanToEnglish(text) {
        if (!text.trim()) return "Matching the mood and context of the dialogue naturally.";
        
        let translated = text;
        const dict = {
            "수학 교실": "a math classroom",
            "교실": "a classroom",
            "방": "John's bedroom",
            "책상": "the desk",
            "침대": "the bed",
            "자명종 시계": "the alarm clock",
            "잠옷 차림": "wearing pajamas",
            "당황해 하는": "panicking and holding his head",
            "말풍선": "speech bubbles",
            "제거": "removed",
            "제외": "excluded",
            "천정": "ceiling",
            "남학생": "Jun (the boy)",
            "여학생": "Mary (the girl)"
        };

        for (let key in dict) {
            let reg = new RegExp(key, "g");
            translated = translated.replace(reg, dict[key]);
        }
        return translated;
    }

    function generateSplitPrompts() {
        const dialogue = document.getElementById('dialogueInput').value.trim();
        const bgKo = document.getElementById('bgInput').value.trim();
        const lightRef = document.getElementById('lightRefInput').value.trim();

        if (!dialogue) {
            alert('영문 다이알로그를 입력해 주세요!');
            return;
        }

        const bgEn = translateKoreanToEnglish(bgKo);

        // [STAGE 1] 라이트 모드 프롬프트 구조 (독립 빌드)
        const lightPrompt = `Please generate ONE single illustration for [LIGHT MODE] with a strict 1:1 square aspect ratio, based on the provided data.

[Character & Style Consistency]
- Refer to the style, character design, and line work of the existing images: "bg_MathMagic_EL.jpg" and "bg_MathMagic_ED.jpg".
- The main character is Jun (modeled as John here): Messy brown hair, brown eyes, freckles.
- Maintain the same modern Webtoon/Anime illustration art style, character proportions, and facial features.

[Dialogue & Situation]
- Dialogue: 
${dialogue}

- Detailed Scene Setup & Modifications: 
${bgEn}

[Image Specifications: Light Mode]
- Bright, warm, and natural morning/daytime room lighting.
- Soft beige, cream, and warm tones for the overall color palette.
- Do NOT split the screen. Generate exactly ONE clean 1:1 square image.`;

        // [STAGE 2] 다크 모드 프롬프트 구조 (확정된 라이트 모드 이미지를 명시적으로 주입)
        let imageInheritanceText = '- Refer to the [LIGHT MODE] image you just generated in this session.';
        if (lightRef) {
            imageInheritanceText = `- Refer to the specific [LIGHT MODE] image file named "${lightRef}" verbatim.`;
        }

        const darkPrompt = `Based on the final established [LIGHT MODE] image, now generate the corresponding [DARK MODE] version as ONE single 1:1 square illustration.

[Strict Consistency from the Target Image]
${imageInheritanceText}
- Keep everything EXACTLY THE SAME as that specific light mode image: the character's pose, facial expression, the placement of all objects (desk, bed, clock, etc.), and the overall room layout. 
- Retain all the modifications made in that final light mode version (e.g., specific object removals or additions).
- Do NOT change the composition. Simply shift the environment from day to night.

[Image Specifications: Dark Mode (Based on bg_MathMagic_ED.jpg)]
- Dimmed, cool, and nocturnal atmosphere.
- Change the overall color palette to dark teal, cyan, and deep blue-green tones.
- Replace the warm daytime light with a cool neon/artificial overhead light glow from the ceiling.
- Do NOT split the screen or show side-by-side comparison. Generate exactly ONE clean 1:1 dark mode image.`;

        // 결과 삽입 및 화면 표시
        document.getElementById('lightOutput').value = lightPrompt;
        document.getElementById('darkOutput').value = darkPrompt;
        document.getElementById('outputSection').style.display = 'block';
    }

    function copyText(elementId) {
        const resultText = document.getElementById(elementId);
        if (!resultText.value) {
            alert('생성된 코멘트가 없습니다.');
            return;
        }
        resultText.select();
        document.execCommand('copy');
        
        const modeName = elementId === 'lightOutput' ? '라이트 모드' : '다크 모드';
        alert(`${modeName} 코멘트가 클립보드에 복사되었습니다! 제미나이에 붙여넣으세요.`);
    }
</script>

</body>
</html>
